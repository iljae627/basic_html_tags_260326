    <section class="main">
      <div class="container">
        <h1>Media</h1>
        <br />
        <form action="">
          <fieldset>
            <legend>사용자등록</legend>
            <p>문제 정답 작성 필수</p>
          </fieldset>
        </form>

        <form action="">
          <fieldset>
            <legend>실제 정보를 입력하진 마세요!</legend>
          </fieldset>
        </form>

        <br />

        <h2>이름 작성란</h2>
        <form>
          <label for="fname">이름:</label>
          <input type="text" id="fname" name="fname" value="일재" /><br />

          <label for="lname">성:</label>
          <input type="text" id="lname" name="lname" value="정" /><br /><br />

          <input type="submit" value="Submit" />
        </form>

        <br />

        <h2>가장 좋아하는 웹언어? / 관심있는 언어? :</h2>

        <form>
          <input
            type="radio"
            id="html"
            name="wep_language"
            value="HTML"
            checked
          />
          <label for="html">HTML</label><br />
          <input type="radio" id="css" name="wep_language" value="CSS" />
          <label for="css">CSS</label><br />
          <input
            type="radio"
            id="javascript"
            name="wep_language"
            value="javascript"
          />
          <label for="javascript">JavaScript</label><br /><br />
          <input type="radio" id="python" name="fav_language" value="python" />
          <label for="python">python</label><br />
          <input type="radio" id="c++" name="fav_language" value="c++" />
          <label for="c++">c++</label><br />
          <input type="submit" value="Submit" />
        </form>

        <br />

        <h2>살고싶은곳?</h2>

        <form action="">
          <input
            type="checkbox"
            id="country1"
            name="country"
            value="KOR"
            checked
          />
          <label for="country1"> 대한민국</label><br />

          <input type="checkbox" id="country2" name="country" value="JPN" />
          <label for="country2"> 일본</label><br />

          <input type="checkbox" id="country3" name="country" value="CHN" />
          <label for="country3"> 중국</label><br /><br />

          <input type="submit" value="제출" />
        </form>

        <br />

        <h1>ID/PW 입력</h1>
        <form>
          <label for="username">Username:</label><br />
          <input type="text" id="username" name="username" /><br />
          <label for="pwd">Password:</label><br />
          <input type="password" id="pwd" name="pwd" /><br /><br />
          <input type="submit" value="Submit" />
          <input type="reset" value="Reset" />
          <br />
          <!-- <input type="button" onclick="alert('Hello World!')" value="Click Me!" />
      <button onclick="alert('헬로월드')">헬로월드!!!!!!!!!!</button> -->
          <br />
          <button>
            <br />
            <label for="favcolor">좋아하는 색 골라주세요!:</label>
            <input type="color" id="favcolor" name="favcolor" />
          </button>
          <br /><br />

          <label for="birthday">생일 :</label>
          <input type="date" id="birthday" name="birthday" />

          <br /><br />

          <!-- <label for="datemax">Enter a date before 1980-01-01:</label>
      <input
        type="date"
        id="datemax"
        name="datemax"
        max="1979-12-31"
      /><br /><br />

      <label for="datemin">Enter a date after 2000-01-01:</label>
      <input type="date" id="datemin" name="datemin" min="2000-01-02" />
      <br /><br /> -->

          <label for="Nowtime">입력 당시의 날짜와 시간을 작성해 주세요 :</label>
          <input type="datetime-local" id="Nowtime" name="Nowtime" />
          <br /><br />

          <label for="email">이메일을 작성해주세요:</label>
          <input type="email" id="email" name="email" />
          <br /><br />

          <label for="myfile">여권사진을 올려주세요 :</label>
          <input type="file" id="myfile" name="myfile" />
          <br />

          <input type="hidden" id="custId" name="custId" value="3487" />
          <br />

          <label for="problem">문제입니다! 2+3은? (1~5사이의 정수 입력):</label>
          <input
            type="number"
            id="problem"
            name="problem"
            min="1"
            max="5"
            required
          />
          <br /><br />

          <label for="eag">당신의 열정 수치 (0 ~ 50):</label>
          <input type="range" id="eag" name="eag" min="0" max="50" />
          <br /><br />

          <label for="gsearch">구글 서칭(필요하면 쓰세요):</label>
          <input type="search" id="gsearch" name="gsearch" />
          <br /><br />

          <label for="phone">휴대폰 번호를 입력해주세요:</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"
          />
          <br /><br />

          <label for="appt">매일 과제 시작 시간을 알려주세요:</label>
          <input type="time" id="appt" name="appt" />
          <br /><br />

          <label for="homepage">당신의 블로그 주소를 알려주세요:</label>
          <input type="url" id="homepage" name="homepage" />
        </form>

        <br />
        <h2>가장 좋아하는 교수님은?</h2>

        <form>
          <label for="pro">누구일까?:</label>
          <select id="pro" name="pro" size="2" multiple>
            <option value="pro1">이병천 교수님</option>
            <option value="pro2">유승재 교수님</option>
            <option value="pro3">양환석 교수님</option>
            <option value="pro4">김성규 교수님</option>
            <option value="pro5">강성범 교수님</option>
          </select>
          <input type="submit" />
        </form>
        <br /><br />

        <h2>자기소개</h2>
        <form action="">
          <textarea name="message" rows="5" cols="50">
자기소개 작성란 입니다. 아무거나 적으세요.</textarea
          >
          <br />
          <input type="submit" />
        </form>
      </div>
    </section>
  </body>
</html>
